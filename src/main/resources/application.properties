spring.application.name=spiderlily
# Kết nối đến MySQL Laragon
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/truyen_online?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Cấu hình Hibernate (Tự động cập nhật cấu trúc bảng nếu có thay đổi)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect