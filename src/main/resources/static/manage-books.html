<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Truyện - 3T Story</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS Thanh phân trang nằm ở cuối bảng dữ liệu */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            padding: 10px;
        }

        .pagination-btn {
            background-color: #3D2B22;
            color: #F8F3E9;
            border: 1px solid #C08B5C;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pagination-btn:hover:not(:disabled) {
            background-color: #C08B5C;
            color: #2D1F18;
        }

        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #555;
        }

        .page-info {
            color: #BEB29A;
            font-size: 14px;
            font-weight: bold;
            background-color: #2D1F18;
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #3D2B22;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-container">
                <span class="logo-text">3T <span class="highlight">Story</span></span>
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="manage-users.html" class="menu-item"><i class="fa-solid fa-users"></i> Đọc giả</a>
                <a href="admin.html" class="menu-item"><i class="fa-solid fa-list"></i> Danh mục truyện</a>
                <a href="manage-books.html" class="menu-item active"><i class="fa-solid fa-book"></i> Quản lý Truyện</a>
                <a href="manage-chapters.html" class="menu-item"><i class="fa-solid fa-list-ol"></i> Quản lý Chương</a>
                <a href="manage-banners.html" class="menu-item"><i class="fa-solid fa-images"></i> Quản lý Banner</a>
                <a href="manage-comments.html" class="menu-item"><i class="fas fa-comments"></i> Quản lý Bình luận</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="system-title">3T STORY <span class="sub-title">MANAGEMENT SYSTEM</span></div>
                <div class="admin-profile">
                    <div class="admin-info">
                        <span class="role">👑 ADMIN</span>
                        <span class="name">TIÊN LÊ</span>
                    </div>
                    <div class="avatar">TL</div>
                </div>
            </header>

            <section class="content-body">
                <div class="table-card">

                    <div class="table-header">
                        <h2><i class="fa-solid fa-book"></i> Danh Sách Các Bộ Truyện</h2>
                        <button class="add-btn" onclick="location.href='add-book.html'">
                            <i class="fa-solid fa-plus"></i> Thêm truyện mới
                        </button>
                    </div>

                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Ảnh bìa</th>
                                <th>Tên truyện</th>
                                <th>Tác giả</th>
                                <th>Danh mục</th>
                                <th style="text-align: center;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="book-table-body">
                        </tbody>
                    </table>

                    <div class="pagination-container">
                        <button id="btnPrev" class="pagination-btn">
                            <i class="fa-solid fa-chevron-left"></i> Trang trước
                        </button>
                        <span id="pageInfo" class="page-info">Trang 1 / 1</span>
                        <button id="btnNext" class="pagination-btn">
                            Trang sau <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <script>
        const BOOK_API = 'http://localhost:8080/api/books';

        // Quản lý trạng thái trang hiện tại
        let currentPage = 0;
        const pageSize = 5;

        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const pageInfo = document.getElementById('pageInfo');

        function loadBooks(page) {
            // Truyền tham số page và size lên REST API
            fetch(`${BOOK_API}?page=${page}&size=${pageSize}`)
                .then(res => res.json())
                .then(pageData => {
                    const tbody = document.getElementById('book-table-body');
                    tbody.innerHTML = '';

                    // Spring Boot Page trả mảng dữ liệu nằm trong trường 'content'
                    const books = pageData.content || [];
                    const totalPages = pageData.totalPages || 1;

                    if (books.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 30px; color:#C08B5C;">Chưa có cuốn truyện nào ở trang này.</td></tr>`;
                        pageInfo.innerText = `Trang ${page + 1} / ${totalPages}`;
                        btnPrev.disabled = true;
                        btnNext.disabled = true;
                        return;
                    }

                    books.forEach(book => {
                        const tr = document.createElement('tr');

                        const coverImg = book.coverUrl
                            ? `<img src="http://localhost:8080${book.coverUrl}" style="width: 50px; height: 70px; object-fit: cover; border-radius: 6px; border: 1px solid #3D2B22;">`
                            : `<span style="color: #C08B5C; font-size: 13px;">Không ảnh</span>`;

                        tr.innerHTML = `
                            <td><strong>#${book.id}</strong></td>
                            <td>${coverImg}</td>
                            <td style="font-weight: 600; color: #F8F3E9;">${book.title}</td>
                            <td style="color: #F8F3E9;">${book.author || 'Ẩn danh'}</td>
                            <td><span class="category-badge">${book.category ? book.category.name : 'Chưa phân loại'}</span></td>
                            <td style="text-align: center;">
                                <button class="action-btn edit-btn" onclick="location.href='edit-book.html?id=${book.id}'"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="action-btn delete-btn" onclick="deleteBook(${book.id}, '${book.title}')"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });

                    // Cập nhật text hiển thị số trang hiện tại
                    pageInfo.innerText = `Trang ${page + 1} / ${totalPages}`;

                    // Cấu hình trạng thái vô hiệu hóa (disabled) nút bấm
                    btnPrev.disabled = (page === 0);
                    btnNext.disabled = (page >= totalPages - 1);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('book-table-body').innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 30px; color:red;">⚠️ Lỗi kết nối đến Server!</td></tr>`;
                });
        }

        // Sự kiện khi nhấn nút Trang trước
        btnPrev.addEventListener('click', () => {
            if (currentPage > 0) {
                currentPage--;
                loadBooks(currentPage);
            }
        });

        // Sự kiện khi nhấn nút Trang sau
        btnNext.addEventListener('click', () => {
            currentPage++;
            loadBooks(currentPage);
        });

        function deleteBook(id, title) {
            if (confirm(`Bạn có chắc muốn xóa bộ truyện "${title}" không?`)) {
                fetch(`${BOOK_API}/${id}`, { method: 'DELETE' })
                    .then(res => {
                        if (res.ok) {
                            // Tải lại dữ liệu của chính trang hiện tại sau khi xóa thành công
                            loadBooks(currentPage);
                        }
                    });
            }
        }

        // Khởi chạy load dữ liệu trang đầu tiên khi mở ứng dụng
        loadBooks(currentPage);
    </script>
</body>

</html>
