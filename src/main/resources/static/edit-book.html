<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chỉnh Sửa Truyện - 3T Story</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-container">
                <span class="logo-text">3T <span class="highlight">Story</span></span>
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="manage-users.html" class="menu-item"><i class="fa-solid fa-users"></i> Đọc giả</a>
                <a href="admin.html" class="menu-item"><i class="fa-solid fa-list"></i> Danh mục truyện</a>
                <a href="manage-books.html" class="menu-item active"><i class="fa-solid fa-book"></i> Quản lý Truyện</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="system-title">3T STORY <span class="sub-title">MANAGEMENT SYSTEM</span></div>
            </header>

            <section class="content-body">
                <div class="table-card">

                    <div class="form-title-container">
                        <a href="manage-books.html" class="back-link-icon">
                            <i class="fa-solid fa-arrow-left"></i>
                        </a>
                        <h2 class="main-form-title">
                            Chỉnh Sửa Thông Tin Bộ Truyện (ID: #<span id="book-id-text"></span>)
                        </h2>
                    </div>

                    <form id="edit-book-form">
                        <div class="horizontal-form">

                            <div class="form-column">
                                <div class="input-group">
                                    <label for="title">Tên bộ truyện <span style="color: #dc2626;">*</span></label>
                                    <input type="text" id="title" required>
                                </div>

                                <div class="input-group">
                                    <label for="author">Tác giả</label>
                                    <input type="text" id="author">
                                </div>

                                <div class="input-group">
                                    <label for="category-select">Thuộc Danh mục/Thể loại <span
                                            style="color: #dc2626;">*</span></label>
                                    <select id="category-select" required>
                                        <option value="" style="background-color: #241A16;">-- Chọn danh mục truyện --
                                        </option>
                                    </select>
                                </div>

                                <div class="input-group">
                                    <label for="coverFile">Thay đổi ảnh bìa mới (Bỏ trống nếu giữ nguyên ảnh cũ)</label>
                                    <input type="file" id="coverFile" accept="image/*">

                                    <div id="current-cover-container"
                                        style="margin-top: 10px; font-size: 13px; color: #DCCFBC;">
                                        Ảnh hiện tại: <a id="current-cover-link" href="#" target="_blank"
                                            style="color: #C08B5C; text-decoration: underline;">Xem ảnh</a>
                                    </div>
                                </div>
                            </div>

                            <div class="form-column">
                                <div class="input-group">
                                    <label for="summary">Tóm tắt nội dung</label>
                                    <textarea id="summary" placeholder="Nhập tóm tắt cốt truyện..."
                                        rows="12"></textarea>
                                </div>
                            </div>

                        </div>

                        <div class="form-actions-container">
                            <button type="button" class="btn-secondary" onclick="location.href='manage-books.html'">Hủy
                                bỏ</button>
                            <button type="submit" class="btn-primary">Cập nhật truyện</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');

        document.getElementById('book-id-text').textContent = bookId;

        // 1. Tải danh sách danh mục vào ô Select trước
        function loadCategories() {
            return fetch('http://localhost:8080/api/categories')
                .then(res => res.json())
                .then(data => {
                    const select = document.getElementById('category-select');
                    data.forEach(cat => {
                        const opt = document.createElement('option');
                        opt.value = cat.id;
                        opt.textContent = cat.name;
                        opt.style.backgroundColor = '#241A16'; // Giữ option tiệp màu tối
                        select.appendChild(opt);
                    });
                });
        }

        // 2. Tải thông tin cũ điền ngược vào Form
        function loadBookDetails() {
            fetch(`http://localhost:8080/api/books/${bookId}`)
                .then(res => res.json())
                .then(book => {
                    document.getElementById('title').value = book.title;
                    document.getElementById('author').value = book.author || '';
                    document.getElementById('summary').value = book.summary || '';
                    if (book.category) {
                        document.getElementById('category-select').value = book.category.id;
                    }
                    if (book.coverUrl) {
                        document.getElementById('current-cover-link').href = `http://localhost:8080${book.coverUrl}`;
                    } else {
                        document.getElementById('current-cover-container').style.display = 'none';
                    }
                })
                .catch(err => console.error('Lỗi tải chi tiết truyện:', err));
        }

        // Chạy tuần tự logic đổ dữ liệu
        loadCategories().then(loadBookDetails);

        // 3. Xử lý sự kiện gửi dữ liệu cập nhật (PUT)
        document.getElementById('edit-book-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData();

            const bookData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                summary: document.getElementById('summary').value
            };

            formData.append("book", new Blob([JSON.stringify(bookData)], { type: "application/json" }));

            const fileInput = document.getElementById('coverFile');
            if (fileInput.files.length > 0) {
                formData.append("file", fileInput.files[0]);
            }

            const categoryId = document.getElementById('category-select').value;

            fetch(`http://localhost:8080/api/books/${bookId}?categoryId=${categoryId}`, {
                method: 'PUT',
                body: formData
            })
                .then(response => {
                    if (response.ok) {
                        alert("Cập nhật thông tin truyện thành công! ✨");
                        location.href = 'manage-books.html';
                    } else {
                        alert("Có lỗi xảy ra khi cập nhật truyện.");
                    }
                })
                .catch(error => console.error('Lỗi hệ thống:', error));
        });
    </script>
</body>

</html>
