<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3T Story - Góc Đọc Sách Thư Giãn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap"
        rel="stylesheet">

    <style>
        body {
            background-color: #F2E7D4;
            color: #8A6B4A;
            margin: 0;
            font-family: 'Merriweather', 'Georgia', serif;
        }

        .client-body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .client-header {
            background-color: #C7AD84;
            border-bottom: 2px solid #C08B5C;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px rgba(138, 107, 74, 0.1);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #FDFBF7;
            text-decoration: none;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: 'Playfair Display', serif;
        }

        .logo-text .highlight {
            color: #8A6B4A;
            background-color: #F2E7D4;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 6px;
        }

        .search-bar {
            display: flex;
            background-color: #D6BE98;
            border: 1px solid #C08B5C;
            border-radius: 6px;
            padding: 6px 14px;
            width: 320px;
            align-items: center;
        }

        .search-bar input {
            background: none;
            border: none;
            color: #FDFBF7;
            width: 100%;
            font-size: 14px;
            outline: none;
            padding-left: 8px;
            font-family: 'Merriweather', serif;
        }

        .search-bar input::placeholder {
            color: #F2E7D4;
        }

        .search-bar i {
            color: #FDFBF7;
        }

        /* CSS CHO CÁC NÚT TÀI KHOẢN TRÊN HEADER */
        .auth-btn {
            color: #FDFBF7;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 7px 14px;
            border-radius: 4px;
            border: 1px solid #C08B5C;
            background-color: #D6BE98;
            transition: all 0.3s;
            cursor: pointer;
            font-family: 'Merriweather', serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .auth-btn:hover {
            background: #FDFBF7;
            color: #8A6B4A;
            border-color: #FDFBF7;
        }

        .logout-btn {
            background-color: #8A6B4A;
            border-color: #8A6B4A;
        }

        .logout-btn:hover {
            background-color: #b54949;
            color: white;
            border-color: #b54949;
        }

        .user-welcome-txt {
            color: #2D1F18;
            font-size: 14px;
            font-weight: bold;
        }

        .section-title {
            color: #8A6B4A;
            font-size: 22px;
            border-left: 3px solid #C08B5C;
            padding-left: 10px;
            margin-bottom: 30px;
            font-weight: 600;
            font-family: 'Playfair Display', serif;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 30px;
        }

        .book-card {
            background-color: #C7AD84;
            border: 1px solid #D6BE98;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(138, 107, 74, 0.08);
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-4px);
            border-color: #C08B5C;
            background-color: #BEA277;
            box-shadow: 0 6px 15px rgba(138, 107, 74, 0.15);
        }

        .book-card-cover {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 1px solid #D6BE98;
        }

        .book-card-info {
            padding: 14px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .book-card-title {
            font-size: 15px;
            color: #FDFBF7;
            font-weight: 700;
            margin: 0 0 6px 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        .book-card-author {
            font-size: 12px;
            color: #F2E7D4;
            margin: 0 0 12px 0;
        }

        .book-card-category {
            font-size: 11px;
            color: #FDFBF7;
            background-color: #C08B5C;
            padding: 4px 10px;
            border-radius: 4px;
            align-self: flex-start;
            margin-top: auto;
            font-weight: 600;
        }

        /* --- CSS CHO BANNER SLIDER --- */
        .banner-slider-container {
            max-width: 1200px;
            margin: 0 auto 35px auto;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background-color: #2D1F18;
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slider-item {
            min-width: 100%;
            box-sizing: border-box;
            display: block;
        }

        .slider-item img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            display: block;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(61, 43, 34, 0.7);
            color: #F8F3E9;
            border: 1px solid #C08B5C;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
            z-index: 10;
        }

        .slider-btn:hover {
            background-color: #C08B5C;
            color: #2D1F18;
        }

        .prev-btn {
            left: 15px;
        }

        .next-btn {
            right: 15px;
        }

        .slider-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(248, 243, 233, 0.5);
            cursor: pointer;
            transition: all 0.2s;
        }

        .dot.active {
            background-color: #C08B5C;
            width: 25px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <header class="client-header">
        <div class="logo-container">
            <span class="logo-text" onclick="location.href='index.html'">3T <span class="highlight">Story</span></span>
        </div>

        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Tìm kiếm tựa truyện nhẹ nhàng...">
        </div>

        <div id="authHeaderZone" style="display: flex; align-items: center; gap: 8px;">
        </div>
    </header>

    <main class="client-body">
        <div class="banner-slider-container">
            <div class="slider-wrapper" id="sliderWrapper">
            </div>

            <button class="slider-btn prev-btn" onclick="moveSlider(-1)"><i
                    class="fa-solid fa-chevron-left"></i></button>
            <button class="slider-btn next-btn" onclick="moveSlider(1)"><i
                    class="fa-solid fa-chevron-right"></i></button>

            <div class="slider-dots" id="sliderDots"></div>
        </div>

        <h2 class="section-title">☕ GÓC THƯ GIÃN</h2>
        <div class="books-grid" id="books-container">
            <p style="color: #8A6B4A; grid-column: 1/-1; text-align: center;">Đang sửa soạn giá sách...</p>
        </div>
    </main>

    <script>
        const BOOK_API = 'http://localhost:8080/api/books';
        const BANNER_API = 'http://localhost:8080/api/banners';

        let currentSlideIndex = 0;
        let totalSlides = 0;

        // 1. LOGIC KIỂM TRA TRẠNG THÁI ĐĂNG NHẬP ĐỂ ĐỔI NÚT HEADER
        function checkLoginStatus() {
            const authZone = document.getElementById("authHeaderZone");
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));

            if (currentUser) {
                let adminButtonHtml = "";
                if (currentUser.role === "ADMIN") {
                    adminButtonHtml = `<a href="manage-books.html" class="auth-btn"><i class="fa-solid fa-user-shield"></i> Góc Quản Trị</a>`;
                }

                authZone.innerHTML = `
                    <span class="user-welcome-txt">Chào, ${currentUser.fullName || currentUser.username}</span>
                    ${adminButtonHtml}
                    <button onclick="handleLogout()" class="auth-btn logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</button>
                `;
            } else {
                authZone.innerHTML = `
                    <a href="login.html" class="auth-btn"><i class="fa-solid fa-key"></i> Đăng nhập</a>
                    <a href="register.html" class="auth-btn"><i class="fa-solid fa-user-plus"></i> Đăng ký</a>
                `;
            }
        }

        function handleLogout() {
            localStorage.removeItem("currentUser");
            window.location.reload();
        }

        // 2. HÀM TẢI BANNER TỪ SPRING BOOT VÀ ĐỔ RA SLIDER
        function loadBannersToHome() {
            fetch(BANNER_API)
                .then(res => res.json())
                .then(banners => {
                    const wrapper = document.getElementById("sliderWrapper");
                    const dotsContainer = document.getElementById("sliderDots");

                    wrapper.innerHTML = "";
                    dotsContainer.innerHTML = "";

                    if (!banners || banners.length === 0) {
                        document.querySelector(".banner-slider-container").style.display = "none";
                        return;
                    }

                    totalSlides = banners.length;

                    banners.forEach((banner, index) => {
                        let finalImgUrl = banner.imageUrl;
                        if (finalImgUrl && finalImgUrl.startsWith("/")) {
                            finalImgUrl = "http://localhost:8080" + finalImgUrl;
                        }

                        const slideLink = document.createElement("a");
                        slideLink.href = banner.linkToBook || "#";
                        slideLink.className = "slider-item";
                        slideLink.innerHTML = `<img src="${finalImgUrl}" alt="${banner.title}" onerror="this.src='https://via.placeholder.com/1200x380?text=Loi+Anh+Banner'">`;
                        wrapper.appendChild(slideLink);

                        const dot = document.createElement("div");
                        dot.className = `dot ${index === 0 ? 'active' : ''}`;
                        dot.setAttribute("onclick", `goToSlide(${index})`);
                        dotsContainer.appendChild(dot);
                    });
                })
                .catch(err => {
                    console.error("Lỗi khi tải banner:", err);
                    document.querySelector(".banner-slider-container").style.display = "none";
                });
        }

        // Tự động chuyển Slide mỗi 5 giây
        setInterval(() => {
            moveSlider(1);
        }, 5000);

        function moveSlider(direction) {
            if (totalSlides === 0) return;
            currentSlideIndex += direction;
            if (currentSlideIndex >= totalSlides) currentSlideIndex = 0;
            if (currentSlideIndex < 0) currentSlideIndex = totalSlides - 1;
            updateSliderPosition();
        }

        function goToSlide(index) {
            currentSlideIndex = index;
            updateSliderPosition();
        }

        function updateSliderPosition() {
            const wrapper = document.getElementById("sliderWrapper");
            if (wrapper) wrapper.style.transform = `translateX(-${currentSlideIndex * 100}%)`;

            const dots = document.querySelectorAll(".slider-dots .dot");
            dots.forEach((dot, idx) => {
                if (idx === currentSlideIndex) {
                    dot.classList.add("active");
                } else {
                    dot.classList.remove("active");
                }
            });
        }

        // 3. HÀM TẢI TRUYỆN CŨ CỦA BẠN
        function loadAllBooksToHome() {
            fetch(BOOK_API)
                .then(response => {
                    if (!response.ok) throw new Error("Lỗi mạng!");
                    return response.json();
                })
                .then(books => {
                    const container = document.getElementById('books-container');
                    container.innerHTML = '';
                    if (books.length === 0) {
                        container.innerHTML = `<p style="color: #8A6B4A; grid-column: 1/-1; text-align: center;">Chưa có cuốn sách nào được đặt ở đây.</p>`;
                        return;
                    }
                    books.forEach(book => {
                        const coverImgUrl = book.coverUrl ? `http://localhost:8080${book.coverUrl}` : 'https://via.placeholder.com/180x240/C7AD84/FDFBF7?text=3T+Story';
                        const categoryName = book.category ? book.category.name : 'Truyện Chữ';

                        const bookLink = document.createElement('a');
                        bookLink.className = 'book-card';
                        bookLink.href = `detail-book.html?id=${book.id}`;
                        bookLink.innerHTML = `
                            <img src="${coverImgUrl}" alt="${book.title}" class="book-card-cover" onerror="this.src='https://via.placeholder.com/180x240/C7AD84/FDFBF7?text=3T+Story'">
                            <div class="book-card-info">
                                <h3 class="book-card-title">${book.title}</h3>
                                <p class="book-card-author"><i class="fa-regular fa-user"></i> ${book.author || 'Khuyết Danh'}</p>
                                <span class="book-card-category">${categoryName}</span>
                            </div>
                        `;
                        container.appendChild(bookLink);
                    });
                })
                .catch(error => {
                    console.error("Lỗi khi tải truyện:", error);
                    document.getElementById('books-container').innerHTML = `<p style="color: #8A6B4A; grid-column: 1/-1; text-align: center;">❌ Lỗi kết nối đến thư viện Spring Boot.</p>`;
                });
        }

        // KÍCH HOẠT CHẠY ĐỒNG THỜI HEADER, BANNER VÀ TRUYỆN KHI VÀO TRANG CHỦ
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            loadBannersToHome();
            loadAllBooksToHome();
        });
    </script>
</body>

</html>
