<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thêm Truyện Mới - 3T Story</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-container">
                <span class="logo-text">3T <span class="highlight">Story</span></span>
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="manage-users.html" class="menu-item"><i class="fa-solid fa-users"></i> Đọc giả</a>
                <a href="admin.html" class="menu-item"><i class="fa-solid fa-list"></i> Danh mục truyện</a>
                <a href="manage-books.html" class="menu-item active"><i class="fa-solid fa-book"></i> Quản lý Truyện</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="system-title">3T STORY <span class="sub-title">MANAGEMENT SYSTEM</span></div>
            </header>

            <section class="content-body">
                <div class="table-card">

                    <div class="form-title-container">
                        <a href="manage-books.html" class="back-link-icon">
                            <i class="fa-solid fa-arrow-left"></i>
                        </a>
                        <h2 class="main-form-title">Thêm Truyện Mới</h2>
                    </div>

                    <form id="add-book-form">
                        <div class="horizontal-form">

                            <div class="form-column">
                                <div class="input-group">
                                    <label for="title">Tên bộ truyện <span style="color: #dc2626;">*</span></label>
                                    <input type="text" id="title"
                                        placeholder="Ví dụ: Đắc Nhân Tâm, Thần Điêu Đại Hiệp..." required>
                                </div>

                                <div class="input-group">
                                    <label for="author">Tác giả</label>
                                    <input type="text" id="author" placeholder="Nhập tên tác giả...">
                                </div>

                                <div class="input-group">
                                    <label for="category-select">Thuộc Danh mục/Thể loại <span
                                            style="color: #dc2626;">*</span></label>
                                    <select id="category-select" required>
                                        <option value="" style="background-color: #241A16;">-- Chọn danh mục truyện --
                                        </option>
                                    </select>
                                </div>

                                <div class="input-group">
                                    <label for="coverFile">Ảnh bìa truyện (Tải tệp từ máy)</label>
                                    <input type="file" id="coverFile" accept="image/*">
                                </div>
                            </div>

                            <div class="form-column">
                                <div class="input-group">
                                    <label for="summary">Tóm tắt nội dung</label>
                                    <textarea id="summary" placeholder="Nhập mô tả tóm tắt nội dung truyện..."
                                        rows="12"></textarea>
                                </div>
                            </div>

                        </div>

                        <div class="form-actions-container">
                            <button type="button" class="btn-secondary" onclick="location.href='manage-books.html'">Hủy
                                bỏ</button>
                            <button type="submit" class="btn-primary">Lưu bộ truyện</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script>
        const CATEGORY_API = 'http://localhost:8080/api/categories';
        const BOOK_API = 'http://localhost:8080/api/books';

        function loadCategoriesToSelect() {
            fetch(CATEGORY_API)
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('category-select');
                    data.forEach(category => {
                        const option = document.createElement('option');
                        option.value = category.id;
                        option.textContent = category.name;
                        option.style.backgroundColor = '#241A16'; // Giữ option tiệp màu tối dropdown
                        select.appendChild(option);
                    });
                })
                .catch(error => console.error('Lỗi khi tải danh mục:', error));
        }

        loadCategoriesToSelect();

        document.getElementById('add-book-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData();

            const bookData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                summary: document.getElementById('summary').value
            };

            formData.append("book", new Blob([JSON.stringify(bookData)], { type: "application/json" }));

            const fileInput = document.getElementById('coverFile');
            if (fileInput.files.length > 0) {
                formData.append("file", fileInput.files[0]);
            }

            const categoryId = document.getElementById('category-select').value;

            fetch(`${BOOK_API}?categoryId=${categoryId}`, {
                method: 'POST',
                body: formData
            })
                .then(response => {
                    if (response.ok) {
                        alert("Thêm bộ truyện mới thành công! 📚");
                        location.href = 'manage-books.html';
                    } else {
                        alert("Có lỗi xảy ra khi thêm truyện.");
                    }
                })
                .catch(error => console.error('Lỗi kết nối mạng:', error));
        });
    </script>
</body>

</html>
