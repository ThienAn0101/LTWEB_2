<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Truyện - Không Gian Thư Giãn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #F2E7D4;
            /* [Giấy kem nhạt] tĩnh lặng */
            color: #8A6B4A;
            /* Màu chữ phụ sâu lắng */
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        /* HEADER: Rộng toàn màn hình giống hệt trang chủ */
        .client-header {
            background-color: #C7AD84;
            border-bottom: 2px solid #C08B5C;
            padding: 15px 0;
            /* ĐÃ SỬA: Đổi padding ngang về 0 để căn chỉnh bằng container bên trong */
            display: flex;
            justify-content: center;
        }

        /* Khung chứa nội dung bên trong header để căn giữa đều với thân trang */
        .header-container {
            width: 100%;
            max-width: 1200px;
            /* ĐÃ CHỈNH: Đồng bộ chuẩn kích thước vùng nội dung trang chủ */
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #FDFBF7;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-text .highlight {
            color: #8A6B4A;
            background-color: #F2E7D4;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 6px;
        }

        .back-home-btn {
            color: #FDFBF7;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            background: #D6BE98;
            padding: 7px 16px;
            border-radius: 4px;
            border: 1px solid #C08B5C;
            transition: all 0.3s;
        }

        .back-home-btn:hover {
            background-color: #FDFBF7;
            color: #8A6B4A;
            border-color: #FDFBF7;
        }

        /* BODY: Đã nâng kích thước để trùng khớp với form trang chủ */
        .client-body {
            width: 100%;
            max-width: 1200px;
            /* ĐÃ SỬA: Tăng từ 950px lên 1200px cho bằng khít trang chủ */
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Bảng chi tiết sách nhạt hơn, tạo chiều sâu mềm mại */
        .book-detail-container {
            display: flex;
            gap: 45px;
            background-color: #C7AD84;
            /* [Gỗ nhạt tĩnh lặng] */
            border: 1px solid #D6BE98;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(138, 107, 74, 0.05);
            margin-bottom: 30px;
        }

        .book-detail-left {
            flex: 0 0 220px;
        }

        .detail-cover {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #D6BE98;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .book-detail-right {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .detail-title {
            font-size: 26px;
            color: #FDFBF7;
            /* Trắng ngà nổi bật rực rỡ */
            margin: 0 0 15px 0;
            font-weight: 700;
            line-height: 1.3;
        }

        .detail-meta-item {
            font-size: 16px;
            margin: 8px 0;
            color: #F2E7D4;
            /* Kem nhạt */
        }

        .detail-meta-item strong {
            color: #FDFBF7;
            /* Trắng ngà */
        }

        .detail-tag {
            display: inline-block;
            font-size: 13px;
            color: #FDFBF7;
            background-color: #C08B5C;
            /* Ánh đèn đọc sách làm nhãn nổi bật */
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 600;
        }

        /* Nút đọc sách mang màu ánh nến ấm áp */
        .read-now-btn {
            margin-top: auto;
            background-color: #C08B5C;
            color: #FDFBF7;
            border: none;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            align-self: flex-start;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(192, 139, 92, 0.2);
        }

        .read-now-btn:hover {
            background-color: #FDFBF7;
            color: #8A6B4A;
            transform: translateY(-2px);
        }

        /* Khung tóm tắt truyện */
        .summary-card {
            background-color: #C7AD84;
            /* [Gỗ nhạt tĩnh lặng] */
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #D6BE98;
            box-shadow: 0 4px 15px rgba(138, 107, 74, 0.05);
        }

        .summary-title {
            font-size: 18px;
            color: #FDFBF7;
            border-bottom: 1px solid #D6BE98;
            padding-bottom: 10px;
            margin: 0 0 15px 0;
            font-weight: 600;
        }

        .summary-text {
            font-size: 16px;
            line-height: 1.8;
            color: #FDFBF7;
            /* Chữ trắng ngà của sách giấy cực dễ nhìn */
            text-align: left;
            white-space: pre-line;
            margin: 0;
            letter-spacing: normal;
        }
    </style>
</head>

<body>

    <header class="client-header">
        <div class="header-container">
            <div class="logo-container">
                <span class="logo-text" onclick="location.href='index.html'">3T <span
                        class="highlight">Story</span></span>
            </div>
            <a href="index.html" class="back-home-btn"><i class="fa-solid fa-arrow-left-long"></i> Trở về</a>
        </div>
    </header>

    <main class="client-body">
        <div class="book-detail-container">
            <div class="book-detail-left">
                <img id="book-cover" src="" alt="Ảnh bìa" class="detail-cover">
            </div>
            <div class="book-detail-right">
                <h1 class="detail-title" id="book-title">Đang mở trang sách...</h1>
                <div class="detail-meta-item">
                    <i class="fa-regular fa-user" style="width: 22px; color:#FDFBF7;"></i>
                    <strong>Tác giả:</strong> <span id="book-author">...</span>
                </div>
                <div class="detail-meta-item">
                    <i class="fa-regular fa-folder-open" style="width: 22px; color:#FDFBF7;"></i>
                    <strong>Danh mục:</strong> <span id="book-category" class="detail-tag">...</span>
                </div>
                <div class="detail-meta-item">
                    <i class="fa-regular fa-clock" style="width: 22px; color:#FDFBF7;"></i>
                    <strong>Trạng thái:</strong> <span style="color: #F2E7D4;">Bình yên, ấm nhẹ</span>
                </div>
                <a href="#" id="read-btn" class="read-now-btn">
                    <i class="fa-solid fa-book-open"></i> BẮT ĐẦU ĐỌC
                </a>
            </div>
        </div>

        <div class="summary-card">
            <h2 class="summary-title">📜 TÓM TẤT NỘI DUNG</h2>
            <p class="summary-text" id="book-summary">Đang lật mở...</p>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');

        if (!bookId) location.href = 'index.html';

        function loadBookDetails() {
            fetch(`http://localhost:8080/api/books/${bookId}`)
                .then(response => {
                    if (!response.ok) throw new Error("Thất bại!");
                    return response.json();
                })
                .then(book => {
                    document.getElementById('book-title').textContent = book.title;
                    document.getElementById('book-author').textContent = book.author || 'Khuyết Danh';
                    document.getElementById('book-summary').textContent = book.summary || 'Chưa có tóm tắt.';

                    if (book.category) document.getElementById('book-category').textContent = book.category.name;
                    else document.getElementById('book-category').textContent = 'Truyện Chữ';

                    if (book.coverUrl) document.getElementById('book-cover').src = `http://localhost:8080${book.coverUrl}`;
                    else document.getElementById('book-cover').src = 'https://via.placeholder.com/240x320/C7AD84/FDFBF7?text=3T+Story';

                    document.getElementById('read-btn').addEventListener('click', function (event) {
                        // Ngăn chặn trình duyệt tự động nhảy trang/cuộn trang mặc định của thẻ <a>
                        event.preventDefault();

                        // 1. Kiểm tra thông tin session người dùng ở localStorage (giống như backend trả về)
                        const currentUser = localStorage.getItem("currentUser");

                        // 2. Nếu chưa có dữ liệu đăng nhập
                        if (!currentUser) {
                            alert("Bạn cần đăng nhập để có thể bắt đầu đọc sách nhé! ☕");
                            window.location.href = "login.html"; // Chuyển hướng sang trang đăng nhập
                            return;
                        }

                        // 3. Nếu ĐÃ ĐĂNG NHẬP THÀNH CÔNG, tiến hành chuyển hướng sang chương đọc truyện
                        window.location.href = `read-chapter.html?bookId=${bookId}&chapter=1`;
                    });
                })
                .catch(error => {
                    location.href = 'index.html';
                });
        }
        window.addEventListener('DOMContentLoaded', loadBookDetails);
    </script>
</body>

</html>
